<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTA · 操作系统技术体系</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 720px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f0f6fc;
            margin-bottom: 8px;
        }

        .logo span {
            color: #58a6ff;
        }

        .sub {
            font-size: 18px;
            color: #8b949e;
            margin-bottom: 24px;
        }

        .desc {
            background: #161b22;
            padding: 24px 28px;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: left;
            margin-bottom: 32px;
        }

        .desc p {
            color: #c9d1d9;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .desc p:last-child {
            margin-bottom: 0;
        }

        .desc strong {
            color: #f0f6fc;
        }

        .projects {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .projects a {
            display: block;
            background: #161b22;
            padding: 14px 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.15s;
            text-align: left;
        }

        .projects a:hover {
            background: #21262d;
            border-color: #58a6ff;
        }

        .projects a .status {
            display: inline-block;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 6px;
            background: #21262d;
            color: #8b949e;
            border: 1px solid #30363d;
        }

        .projects a .status.dev {
            color: #58a6ff;
            border-color: #58a6ff;
        }

        .projects a .status.plan {
            color: #8b949e;
            border-color: #30363d;
        }

        .projects a small {
            display: block;
            color: #8b949e;
            font-size: 12px;
            margin-top: 4px;
        }

        .footer {
            font-size: 13px;
            color: #484f58;
            border-top: 1px solid #21262d;
            padding-top: 20px;
            margin-top: 8px;
        }

        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 32px;
            }
            .projects {
                grid-template-columns: 1fr;
            }
            .desc {
                padding: 18px 16px;
            }
            body {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">BTA<span>.</span></div>
        <div class="sub">BOS Software Technology Aggregate</div>

        <div class="desc">
            <p><strong>BTA</strong> 是一个运行在 TurboWarp 上的操作系统技术体系。</p>
            <p>它包含 <strong>BOS</strong> 内核（含 <strong>BVM</strong> 虚拟机）、<strong>BM</strong> 语言、<strong>BMC</strong> 编译器，以及 <strong>Bsh</strong> Shell 和 <strong>BUI</strong> 界面系统。</p>
            <p style="color:#8b949e; font-size:14px;">我们没有工具可用。</p>
        </div>

        <div class="projects">
            <a href="https://github.com/BTA-System/TurboBOS-kernel">
                 BOS 内核 / BVM
                <small>操作系统内核 · 虚拟机</small>
                <span class="status dev">基本已开发完整</span>
            </a>
            <a href="https://github.com/BTA-System/TurboBOS-kernel">
                BM 语言
                <small>类汇编语言</small>
                <span class="status dev">基本已开发完整</span>
            </a>
            <a href="#">
                BMC 编译器
                <small>BM 编译器</small>
                <span class="status plan">规划中</span>
            </a>
            <a href="#">
                Bsh
                <small>Shell 命令行</small>
                <span class="status plan">规划中</span>
            </a>
            <a href="#">
                BUI
                <small>用户界面系统</small>
                <span class="status plan">规划中</span>
            </a>
        </div>

        <div class="footer">
            <a href="https://github.com/BTA-System">GitHub</a> ·
            <a href="https://github.com/BTA-System/TurboBOS-kernel">文档</a> ·
            开源 · GPL-3.0
        </div>
    </div>
</body>
</html>
